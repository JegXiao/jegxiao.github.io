<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉诺塔动画演示器</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">

    <link rel="icon" href="../A图标A/个人LOGO_32.ico" sizes="32x32">
    <link rel="icon" href="../A图标A/个人LOGO_128.ico" sizes="128x128">
    <link rel="apple-touch-icon" href="../A图标A/个人LOGO_256.ico">

    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --panel-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        /* 控制面板样式 */
        .control-panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
            max-width: 800px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 14px;
            font-weight: bold;
            color: #666;
        }

        .control-group input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            align-self: flex-end;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #startBtn { background-color: #2ecc71; color: white; }
        #startBtn:hover { background-color: #27ae60; }
        #pauseBtn { background-color: #e67e22; color: white; }
        #pauseBtn:hover { background-color: #d35400; }
        #resetBtn { background-color: #95a5a6; color: white; }
        #resetBtn:hover { background-color: #7f8c8d; }

        button:disabled {
            background-color: #bdc3c7 !important;
            cursor: not-allowed;
        }

        /* 状态显示 */
        .status-panel {
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* 汉诺塔舞台画布样式 */
        .canvas-container {
            position: relative;
            width: 700px;
            height: 400px;
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* 底座 */
        .base {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 660px;
            height: 20px;
            background-color: #8B4513;
            border-radius: 4px;
            z-index: 1;
        }

        /* 柱子 */
        .peg {
            position: absolute;
            bottom: 40px;
            width: 16px;
            height: 280px;
            background-color: #D2B48C;
            border-radius: 8px 8px 0 0;
            z-index: 2;
        }
        /* 三根柱子的水平定位 */
        #peg-0 { left: 120px; }
        #peg-1 { left: 342px; }
        #peg-2 { left: 564px; }

        /* 圆盘基础样式 */
        .disk {
            position: absolute;
            height: 24px;
            border-radius: 12px;
            z-index: 3;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.2);
            /* 使用 transform 实现平滑的直线过渡动画 */
            transition: transform var(--speed, 0.5s) linear;
            transform-origin: left top;
        }
    </style>
</head>
<body>

<h1>汉诺塔动画演示器</h1>

<div class="control-panel">
    <div class="control-group">
        <label for="layers">层数 (1-10):</label>
        <input type="number" id="layers" min="1" max="10" value="4">
    </div>
    <div class="control-group">
        <label for="stepsPerSec">每秒步数 (个/秒):</label>
        <input type="number" id="stepsPerSec" min="0.1" max="10" step="0.1" value="1">
    </div>
    <div class="control-group">
        <label for="animSpeed">动画速度 (秒):</label>
        <input type="number" id="animSpeed" min="0" max="5" step="0.1" value="0.5">
    </div>
    <div class="btn-group">
        <button id="startBtn">开始演示</button>
        <button id="pauseBtn" disabled>暂停</button>
        <button id="resetBtn">重置</button>
    </div>
</div>

<div class="status-panel">
    当前步数: <span id="currentStep">0</span> / 总步数: <span id="totalSteps">15</span>
</div>

<div class="canvas-container" id="stage">
    <div class="base"></div>
    <div class="peg" id="peg-0"></div>
    <div class="peg" id="peg-1"></div>
    <div class="peg" id="peg-2"></div>
</div>

<script>
    // --- 全局变量与配置 ---
    const stage = document.getElementById('stage');
    const layersInput = document.getElementById('layers');
    const stepsPerSecInput = document.getElementById('stepsPerSec');
    const animSpeedInput = document.getElementById('animSpeed');

    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    const currentStepEl = document.getElementById('currentStep');
    const totalStepsEl = document.getElementById('totalSteps');

    // 柱子的中心 X 坐标 (对应样式中的 left + width/2)
    const pegPositions = [128, 350, 572];
    const basePriceY = 380; // 盘子放置的底面 Y 坐标
    const diskHeight = 24;  // 每个盘子的高度

    let n = parseInt(layersInput.value); // 盘子层s
    let moveQueue = [];       // 存放预先计算好的步骤队列
    let currentStepIndex = 0; // 当前执行到的步骤索引
    let isPlaying = false;    // 是否正在播放
    let timer = null;         // 步进定时器
    let disks = [];           // 存放盘子 DOM 元素的数组

    // 颜色池，用于区分不同大小的圆盘
    const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c', '#3498db', '#9b59b6', '#34495e', '#16a085', '#27ae60'];

    // 柱子状态：存储当前各柱子上由下至上的盘子尺寸 (尺寸1最小)
    let pegStates = [[], [], []];

    // --- 初始化构建 ---
    function init() {
        // 清除旧圆盘
        disks.forEach(d => d.remove());
        disks = [];
        pegStates = [[], [], []];
        currentStepIndex = 0;
        isPlaying = false;
        if(timer) clearTimeout(timer);

        n = parseInt(layersInput.value);
        if(n < 1) n = 1;
        // if(n > 10) n = 10; // 限制最大10层避免卡顿
        layersInput.value = n;

        currentStepEl.innerText = 0;
        totalStepsEl.innerText = Math.pow(2, n) - 1;

        startBtn.disabled = false;
        startBtn.innerText = "开始演示";
        pauseBtn.disabled = true;

        // 初始化柱子 0 的数据
        for (let i = n; i >= 1; i--) {
            pegStates[0].push(i);
        }

        // 动态生成圆盘并定位
        for (let i = 1; i <= n; i++) {
            const disk = document.createElement('div');
            disk.className = 'disk';
            disk.dataset.size = i;

            // 计算盘子宽度：最小 40 像素，最大 200 像素，按比例递增
            const width = 40 + (i * (160 / n));
            disk.style.width = `${width}px`;
            disk.style.backgroundColor = colors[(i - 1) % colors.length];

            // 初始把盘子挂载到 stage，并使用 translate 移动到初始 A 柱的正确高度
            stage.appendChild(disk);
            disks[i] = disk; // 以尺寸作为索引存储
        }

        // 更新所有圆盘在画布上的绝对坐标
        updateAllDisksPositionImmediately();

        // 生成完整的汉诺塔移动步骤
        moveQueue = [];
        hanoi(n, 0, 2, 1);
    }

    // 递归计算汉诺塔步骤
    function hanoi(diskNum, from, to, aux) {
        if (diskNum === 1) {
            moveQueue.push({ diskSize: 1, from, to });
            return;
        }
        hanoi(diskNum - 1, from, aux, to);
        moveQueue.push({ diskSize: diskNum, from, to });
        hanoi(diskNum - 1, aux, to, from);
    }

    // 根据当前的 pegStates 状态，瞬间刷新所有盘子的样式坐标
    function updateAllDisksPositionImmediately() {
        // 临时关闭动画过渡，用于初始化
        disks.forEach(d => d.style.transition = 'none');

        // 动态更新 CSS 的 transition 速度变量
        stage.style.setProperty('--speed', `${animSpeedInput.value}s`);

        pegStates.forEach((peg, pegIdx) => {
            peg.forEach((diskSize, level) => {
                const disk = disks[diskSize];
                setDiskPosition(disk, diskSize, pegIdx, level);
            });
        });

        // 强制重绘后恢复过渡效果
        setTimeout(() => {
            disks.forEach(d => d.style.transition = `transform var(--speed, 0.5s) linear`);
        }, 50);
    }

    // 计算圆盘在某柱子某高度的绝对坐标，并使用 CSS transform 实现直线运动
    function setDiskPosition(disk, diskSize, pegIdx, level) {
        const width = parseFloat(disk.style.width);
        // X 坐标 = 柱子中心点 - 圆盘半径
        const x = pegPositions[pegIdx] - (width / 2);
        // Y 坐标 = 地面高度 - 之前摞起来的盘子总高度 - 本身高度
        const y = basePriceY - (level * diskHeight) - diskHeight -20 ;

        // 用 transform: translate(x, y) 实现硬件加速的直线移动
        disk.style.transform = `translate(${x}px, ${y}px)`;
    }

    // --- 核心播放逻辑 ---
    function autoPlay() {
        if (!isPlaying) return;

        // 如果已经走完所有步骤
        if (currentStepIndex >= moveQueue.length) {
            isPlaying = false;
            startBtn.disabled = true;
            pauseBtn.disabled = true;
            return;
        }

        // 取出单步任务
        const step = moveQueue[currentStepIndex];

        // 逻辑状态更新：从原柱子弹出，压入新柱子
        pegStates[step.from].pop();
        pegStates[step.to].push(step.diskSize);

        // 动画状态更新：计算新位置，圆盘会根据新设定的 CSS transform 划过去（直线运动）
        const targetLevel = pegStates[step.to].length - 1;
        setDiskPosition(disks[step.diskSize], step.diskSize, step.to, targetLevel);

        // 更新界面计数
        currentStepIndex++;
        currentStepEl.innerText = currentStepIndex;

        // 计算下一步的触发间隔 (秒变毫秒)
        const interval = (1 / parseFloat(stepsPerSecInput.value)) * 1000;
        timer = setTimeout(autoPlay, interval);
    }

    // --- 事件监听与控制器 ---
    startBtn.addEventListener('click', () => {
        // 实时同步一次最新的动画过渡时间
        stage.style.setProperty('--speed', `${animSpeedInput.value}s`);

        isPlaying = true;
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        autoPlay();
    });

    pauseBtn.addEventListener('click', () => {
        isPlaying = false;
        if(timer) clearTimeout(timer);
        startBtn.disabled = false;
        startBtn.innerText = "继续演示";
        pauseBtn.disabled = true;
    });

    resetBtn.addEventListener('click', init);

    // 当用户手动修改参数时，自动重置以便应用新设置
    layersInput.addEventListener('change', init);
    animSpeedInput.addEventListener('change', () => {
        stage.style.setProperty('--speed', `${animSpeedInput.value}s`);
    });

    // 页面首次加载初始化
    init();
</script>
</body>
</html>
