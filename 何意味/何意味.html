<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>何意味 · 何意味</title>

    <!-- 浏览器通用图标 (SVG 方案，自动适应各种尺寸) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>︎❔︎</text></svg>">

    <!-- 针对 iOS 设备 (Apple Touch Icon) -->
    <!-- 注意：iOS 不原生支持在苹果桌面图标上渲染 SVG Emoji，
         如果需要完美效果建议使用图片；但如果坚持用代码，可保留此 SVG 链接 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22white%22/><text y=%22.9em%22 font-size=%2280%22 x=%225%22>❔︎</text></svg>">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        #display-area {
            font-size: 2rem;
            margin-bottom: 2rem;
            min-height: 3rem;
            line-height: 1.5;
            color: #555;
        }
        button {
            padding: 15px 30px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #222;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.8;
        }
        .symbol {
            font-size: 1rem;
            color: #999;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="display-area">点击下方，探寻某种意味。</div>
    <button onclick="generateSentence()">生成“何意味”</button>
    <div class="symbol">—— 何 · 意 · 味 ——</div>
</div>

<script>
    const prefix = [
        "关于", "在", "那种", "所谓的", "某种", "关于记忆的",
        "被剥离的", "潜伏于此的", "不可触及的", "正在折射的",
        "被延迟了的", "甚至连同词语本身的", "在深渊边缘的"
    ];

    const subjects = [
        "影子", "虚无", "时钟的余温", "凌晨三点的蝉鸣", "被遗忘的信封",
        "雨后的铁轨", "空气的重量", "干燥的铁锈", "水面下的火焰",
        "没有收件人的呼吸", "无色透明的剧场", "被揉皱的时间",
        "灰尘的舞蹈", "旧胶片的划痕", "空无一人的候车厅"
    ];

    const actions = [
        "正在消散", "成为了另一种沉默", "是对自我的折叠", "是尚未抵达的告别",
        "在逻辑之外震颤", "拒绝被定义", "正在缓慢地背叛感官",
        "在语言的裂缝中下坠", "稀释了所有的色彩", "仅仅是作为背景存在",
        "试图与昨日和解", "解构了仅存的因果"
    ];

    const endings = [
        "，何意味？", "，此中真意竟为何？", "。是啊，为什么？", "。意谓？",
        "……这究竟，意味着什么？", "——这种事，有何意义？",
        "，其存在本身即是疑问。", "。若无回声，何谈意味？"
    ];

    function generateSentence() {
        const p = prefix[Math.floor(Math.random() * prefix.length)];
        const s = subjects[Math.floor(Math.random() * subjects.length)];
        const a = actions[Math.floor(Math.random() * actions.length)];
        const e = endings[Math.floor(Math.random() * endings.length)];

        const sentence = p + s + a + e;
        document.getElementById('display-area').innerText = sentence;
    }
</script>
</body>
</html>
