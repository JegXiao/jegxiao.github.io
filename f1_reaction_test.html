<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 红灯熄灭反应测试 (空格键支持)</title>

    <style>
        /* CSS 样式部分 (已保留用户更改) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1a0c49;
            color: #1aff01;
            padding: 20px;
        }

        h1 { color: #ff0000; margin-bottom: 30px; }
        #lightsContainer { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .light {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #232323;
            border: 3px solid #404040;
            transition: background-color 0.1s;
        }

        .light.on {
            background-color: #ff0000;
            box-shadow: 0 0 15px rgb(255, 0, 0);
        }
        .gogo{
            color: #000000;
        }
        #testArea {
            width: 100%;
            max-width: 500px;
            height: 200px;
            background-color: #222222;
            margin: 0 auto 30px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8em;
            color: #ffffff;
            user-select: none;
            border: 2px dashed #444;
            transition: background-color 0.1s;
        }

        .too-soon { background-color: #155915 !important; }
        .start-now { background-color: #edcd0d !important; }
        #result { margin-top: 20px; }
        #timeDisplay { font-weight: bold; color: #fffb00; font-size: 2.5em; }
        #message { font-size: 1.1em; color: #ffffff; }

        /* 提示用户使用空格键 */
        /*#testArea p:first-child::after {*/
        /*    content: " (或按空格键)";*/
        /*    font-size: 0.7em;*/
        /*    display: block;*/
        /*    margin-top: 5px;*/
        /*}*/
    </style>
</head>
<body>
    <h1>🚥 F1 发车反应测试 (点击 或 按下空格)</h1>

    <div id="lightsContainer">
        <div class="light" id="light-1"></div>
        <div class="light" id="light-2"></div>
        <div class="light" id="light-3"></div>
        <div class="light" id="light-4"></div>
        <div class="light" id="light-5"></div>
    </div>

    <div id="testArea" tabindex="0"> <p>点击这里开始</p>
    </div>

    <div id="result">
        <p id="message">请点击上方的区域开始</p>
        <h2>反应时间: <span id="timeDisplay">0</span> ms</h2>
        <p id="challengeTimeDisplay" style="color: #4CAF50; font-weight: bold;"></p>
    </div>

    <script>
        // ------------------ Web Audio API 声音生成部分 ------------------
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(frequency, duration, type = 'sine') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            oscillator.type = type;
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            const now = audioContext.currentTime;
            gainNode.gain.setValueAtTime(0.001, now);
            gainNode.gain.exponentialRampToValueAtTime(0.5, now + 0.001);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

            oscillator.start(now);
            oscillator.stop(now + duration + 0.01);
        }

        const Sounds = {
            lightOn: () => playTone(500, 0.15, 'square'),
            lightOut: () => playTone(500, 1.5, 'sawtooth'), // 重命名为 lightOut 更准确
            falseStart: () => playTone(1000, 0.5, 'sawtooth')
        };
        // ----------------------------------------------------------------

        const testArea = document.getElementById('testArea');
        const lights = [1, 2, 3, 4, 5].map(i => document.getElementById(`light-${i}`));
        const timeDisplay = document.getElementById('timeDisplay');
        const message = document.getElementById('message');
        const challengeTimeDisplay = document.getElementById('challengeTimeDisplay');

        let isWaiting = false;
        let isReady = false;
        let startTime = 0;
        let lastLightOnTime = 0; // **【新增】** 记录第5盏灯亮起的时间
        let timeoutID = null;
        let lightIntervalID = null;
        let lightCount = 0;
        let randomWaitTime = 0;


        function resetTest() {
            clearTimeout(timeoutID);
            clearInterval(lightIntervalID);
            lights.forEach(light => light.classList.remove('on'));
            testArea.classList.remove('too-soon', 'start-now');
            testArea.innerHTML = '<p>点击这里开始</p>';
            timeDisplay.textContent = '0';
            message.textContent = '点击开始序列';
            challengeTimeDisplay.textContent = '';

            isWaiting = false;
            isReady = false;
            lightCount = 0;
            lastLightOnTime = 0; // **【重置】** 重置第5盏灯亮起时间
            if (audioContext.state === 'suspended') {
                 audioContext.resume();
            }
        }

        function startSequence() {
            resetTest();
            isWaiting = true;
            message.textContent = '等待发车序列...';
            testArea.innerHTML = '<p>等待...</p>';

            lightCount = 0;

            lightIntervalID = setInterval(() => {
                lightCount++;
                if (lightCount <= 5) {
                    lights[lightCount - 1].classList.add('on');
                    message.textContent = `第 ${lightCount} 盏灯亮起...`;
                    Sounds.lightOn();
                }

                if (lightCount === 5) {
                    // **【记录】** 记录最后一盏灯亮起的时间
                    lastLightOnTime = Date.now();
                    clearInterval(lightIntervalID);
                    startRandomWait();
                }
            }, 1000);
        }

        function startRandomWait() {
            randomWaitTime = Math.floor(Math.random() * 2000) + 500;
            timeoutID = setTimeout(lightsOut, randomWaitTime);
        }

        function lightsOut() {
            isWaiting = false;
            isReady = true;
            startTime = Date.now();

            lights.forEach(light => light.classList.remove('on'));

            Sounds.lightOut();

            testArea.classList.add('start-now');
            testArea.innerHTML = '<p class="gogo">GO! GO! GO!</p>';
            message.textContent = 'GO! 立即点击！';
        }

        /**
         * 统一处理点击/按键事件的函数
         */
        function handleAction() {
            if (audioContext.state === 'suspended') {
                 audioContext.resume();
            }

            const currentTime = Date.now();

            if (isReady) {
                // 成功起步
                const reactionTime = currentTime - startTime;

                timeDisplay.textContent = reactionTime;
                challengeTimeDisplay.textContent = `挑战时间：${randomWaitTime} ms (红灯亮到灭)`;
                testArea.innerHTML = `<p>✅ ${reactionTime} ms</p><p>**点击或按空格重新开始**</p>`;

                if (reactionTime < 200) {
                    message.textContent = '🚀 完美起步！专业赛车手级别！';
                } else if (reactionTime < 400){
                    message.textContent = '👍 优秀！点击重新开始。';
                }else {
                    message.textContent = '不错！点击重新开始。';
                }

                isWaiting = false;
                isReady = false;
                testArea.classList.remove('start-now');

            } else if (isWaiting) {
                // 抢跑逻辑
                Sounds.falseStart();

                clearTimeout(timeoutID);
                clearInterval(lightIntervalID);

                // **【新增抢跑反应时间计算】**
                let falseStartReactionTime = 0;
                let messageText = '';

                if (lightCount === 5) {
                    // 在第5盏灯亮起后、熄灭前点击
                    // 抢跑时间 = 用户点击时间 - 第5盏灯亮起时间
                    falseStartReactionTime = currentTime - lastLightOnTime;
                    messageText = `在灯熄灭前 ${randomWaitTime - falseStartReactionTime} ms 抢跑！`;
                } else {
                    // 在第5盏灯亮起前点击
                    // 抢跑时间 = (5 - lightCount) * 1000 + (1000 - time since last light)
                    // 更简单的显示：显示在第几盏灯亮起时抢跑
                    messageText = `抢跑！请等待第 ${lightCount + 1} 盏灯亮起。`;
                    falseStartReactionTime = `灯亮时点击`;
                }

                testArea.classList.add('too-soon');
                testArea.innerHTML = `<p>❌ 抢跑!</p><p>**点击或按空格重新开始**</p>`;

                // 显示抢跑时间或状态
                timeDisplay.textContent = falseStartReactionTime;
                challengeTimeDisplay.textContent = `抢跑状态：第 ${lightCount} 盏灯已亮`;
                message.textContent = messageText;

                isWaiting = false;
                isReady = false;

            } else {
                // 开始新的测试
                startSequence();
            }
        }

        // 1. 鼠标点击事件监听器 (触发 handleAction)
        testArea.addEventListener('click', handleAction);

        // 2. 键盘事件监听器 (触发 handleAction)
        document.addEventListener('keydown', function(event) {
            if (event.key === ' ' || event.keyCode === 32) {
                event.preventDefault();
                handleAction();
            }
        });

        document.addEventListener('DOMContentLoaded', resetTest);
    </script>
</body>
</html>
