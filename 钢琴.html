<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>键盘钢琴</title>

  <link rel="icon" href="图标/个人LOGO_32.ico" sizes="32x32">
  <link rel="icon" href="图标/个人LOGO_128.ico" sizes="128x128">
  <link rel="apple-touch-icon" href="图标/个人LOGO_256.ico">

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #1a1a1a;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .piano-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding: 30px;
      background: #333;
      border-radius: 15px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      width: 45px;
      height: 140px;
      background: linear-gradient(to bottom, #eee 0%, #fff 100%);
      color: #333;
      border-radius: 0 0 5px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 15px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.05s, background 0.05s;
      position: relative;
      border: 1px solid #ccc;
    }

    /* 激活状态样式 */
    .key.active {
      background: linear-gradient(to bottom, #fff 0%, #4facfe 100%);
      transform: translateY(2px);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }

    .key b { font-size: 1.1em; pointer-events: none; }
    .key span { font-size: 0.7em; color: #888; pointer-events: none; }

    .hint { margin-top: 30px; text-align: center; line-height: 1.6; color: #888; }
    kbd {
      background: #444;
      padding: 2px 6px;
      border-radius: 3px;
      color: #4facfe;
    }
  </style>
</head>
<body>

<h2 style="color: #4facfe;">键盘钢琴</h2>

<div class="piano-container">
  <div class="row" id="row-high"></div>
  <div class="row" id="row-mid"></div>
  <div class="row" id="row-low"></div>
</div>

<div class="hint">
  按住键盘演奏<br>
  高音: <kbd>Q</kbd>-<kbd>U</kbd> | 中音: <kbd>A</kbd>-<kbd>J</kbd> | 低音: <kbd>Z</kbd>-<kbd>M</kbd>
</div>

<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // 存储正在播放的音符实例
  const activeNodes = {};

  const keyMap = {
    'q': 523.25, 'w': 587.33, 'e': 659.25, 'r': 698.46, 't': 783.99, 'y': 880.00, 'u': 987.77,
    'a': 261.63, 's': 293.66, 'd': 329.63, 'f': 349.23, 'g': 392.00, 'h': 440.00, 'j': 493.88,
    'z': 130.81, 'x': 146.83, 'c': 164.81, 'v': 174.61, 'b': 196.00, 'n': 220.00, 'm': 246.94
  };

  const layout = {
    'high': ['q', 'w', 'e', 'r', 't', 'y', 'u'],
    'mid': ['a', 's', 'd', 'f', 'g', 'h', 'j'],
    'low': ['z', 'x', 'c', 'v', 'b', 'n', 'm']
  };

  // 初始化键盘 UI
  Object.keys(layout).forEach(level => {
    const row = document.getElementById(`row-${level}`);
    layout[level].forEach(key => {
      const div = document.createElement('div');
      div.className = 'key';
      div.id = `key-${key}`;
      div.innerHTML = `<span>${key.toUpperCase()}</span><b>${getNoteName(key)}</b>`;

      // 鼠标交互
      div.addEventListener('mousedown', () => startNote(key));
      div.addEventListener('mouseup', () => stopNote(key));
      div.addEventListener('mouseleave', () => stopNote(key)); // 移出按键也停止

      row.appendChild(div);
    });
  });

  function getNoteName(key) {
    const names = ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Si'];
    const idx = layout.high.indexOf(key) !== -1 ? layout.high.indexOf(key) :
            layout.mid.indexOf(key) !== -1 ? layout.mid.indexOf(key) :
                    layout.low.indexOf(key);
    return names[idx];
  }

  // 开始播放音符
  function startNote(key) {
    if (!keyMap[key] || activeNodes[key]) return; // 如果已经在响，则不重复触发

    if (audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine'; // 使用正弦波，听感更纯净
    osc.frequency.setValueAtTime(keyMap[key], audioCtx.currentTime);

    // 稍微有个攻击时值（Attack），防止开场爆音
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    // 保存引用以便后续停止
    activeNodes[key] = { osc, gain };
    document.getElementById(`key-${key}`).classList.add('active');
  }

  // 停止播放音符
  function stopNote(key) {
    if (!activeNodes[key]) return;

    const { osc, gain } = activeNodes[key];
    const releaseTime = 0.1; // 释放时值（Release）

    // 渐隐音量
    gain.gain.cancelScheduledValues(audioCtx.currentTime);
    gain.gain.setValueAtTime(gain.gain.value, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + releaseTime);

    // 延迟停止振荡器
    osc.stop(audioCtx.currentTime + releaseTime);

    delete activeNodes[key];
    document.getElementById(`key-${key}`).classList.remove('active');
  }

  // 键盘全局监听
  window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (!e.repeat) startNote(key); // e.repeat 防止系统自动重复触发 keydown
  });

  window.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    stopNote(key);
  });

</script>
</body>
</html>
