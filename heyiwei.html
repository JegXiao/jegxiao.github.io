<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>何意味 · 发生器</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 80%;
        }
        #display-area {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            min-height: 3rem;
            line-height: 1.5;
            color: #555;
        }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #222;
            color: white;
            border: none;
            border-radius: 5px;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.8;
        }
        .symbol {
            font-size: 0.8rem;
            color: #999;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="display-area">点击下方，探寻某种意义。</div>
        <button onclick="generateSentence()">生成“何意味”</button>
        <div class="symbol">—— 不知意味的瞬间 ——</div>
    </div>

    <script>
const prefix = [
    "关于", "在", "那种", "所谓的", "某种", "关于记忆的", 
    "被剥离的", "潜伏于此的", "不可触及的", "正在折射的", 
    "被延迟了的", "甚至连同词语本身的", "在深渊边缘的"
];

const subjects = [
    "影子", "虚无", "时钟的余温", "凌晨三点的蝉鸣", "被遗忘的信封", 
    "雨后的铁轨", "空气的重量", "干燥的铁锈", "水面下的火焰", 
    "没有收件人的呼吸", "无色透明的剧场", "被揉皱的时间", 
    "灰尘的舞蹈", "旧胶片的划痕", "空无一人的候车厅"
];

const actions = [
    "正在消散", "成为了另一种沉默", "是对自我的折叠", "是尚未抵达的告别", 
    "在逻辑之外震颤", "拒绝被定义", "正在缓慢地背叛感官", 
    "在语言的裂缝中下坠", "稀释了所有的色彩", "仅仅是作为背景存在", 
    "试图与昨日和解", "解构了仅存的因果"
];

const endings = [
    "，何意味？", "，此中真意竟为何？", "。何意味也？", 
    "……这究竟，意味着什么？", "——这种事，有何意义？", 
    "，其存在本身即是疑问。", "。若无回声，何谈意味？"
];

function generateSentence() {
    const p = prefix[Math.floor(Math.random() * prefix.length)];
    const s = subjects[Math.floor(Math.random() * subjects.length)];
    const a = actions[Math.floor(Math.random() * actions.length)];
    const e = endings[Math.floor(Math.random() * endings.length)];

    const sentence = p + s + a + e;
    document.getElementById('display-area').innerText = sentence;
}
    </script>
</body>
</html>
